<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Translation - Local LLM</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #71717a;
    --accent: #6366f1;
    --accent-hover: #818cf8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 0.25rem;
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 2rem;
  }
  .container {
    width: 100%;
    max-width: 900px;
  }
  .lang-bar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .lang-bar select {
    flex: 1;
    padding: 0.5rem 0.75rem;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .swap-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    transition: background 0.15s;
  }
  .swap-btn:hover { background: var(--border); }
  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  @media (max-width: 640px) {
    .panels { grid-template-columns: 1fr; }
  }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    position: relative;
    min-height: 200px;
  }
  .panel textarea {
    width: 100%;
    min-height: 160px;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 1rem;
    line-height: 1.6;
    resize: vertical;
    outline: none;
    font-family: inherit;
  }
  .panel textarea::placeholder { color: var(--muted); }
  .output-text {
    font-size: 1rem;
    line-height: 1.6;
    min-height: 160px;
    white-space: pre-wrap;
    color: var(--text);
  }
  .output-text.placeholder { color: var(--muted); }
  .panel-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--muted);
  }
  .char-count { font-variant-numeric: tabular-nums; }
  .copy-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.8rem;
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .copy-btn:hover { color: var(--text); }
  .translate-btn {
    display: block;
    width: 100%;
    margin-top: 1rem;
    padding: 0.75rem;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .translate-btn:hover { background: var(--accent-hover); }
  .translate-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .status {
    text-align: center;
    margin-top: 0.75rem;
    font-size: 0.8rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .loading {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 0.4rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<h1>Local Translator</h1>
<p class="subtitle">gemma3:1b &middot; Ollama &middot; Offline</p>

<div class="container">
  <div class="lang-bar">
    <select id="sourceLang">
      <option value="">Auto Detect</option>
      <option value="ja">Japanese</option>
      <option value="en" selected>English</option>
      <option value="zh">Chinese</option>
      <option value="ko">Korean</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="es">Spanish</option>
      <option value="pt">Portuguese</option>
      <option value="it">Italian</option>
      <option value="ru">Russian</option>
    </select>
    <button class="swap-btn" onclick="swapLangs()" title="Swap languages">&#8646;</button>
    <select id="targetLang">
      <option value="ja" selected>Japanese</option>
      <option value="en">English</option>
      <option value="zh">Chinese</option>
      <option value="ko">Korean</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="es">Spanish</option>
      <option value="pt">Portuguese</option>
      <option value="it">Italian</option>
      <option value="ru">Russian</option>
    </select>
  </div>

  <div class="panels">
    <div class="panel">
      <textarea id="inputText" placeholder="Enter text to translate..." oninput="updateCount()"></textarea>
      <div class="panel-footer">
        <span class="char-count" id="charCount">0 chars</span>
        <button class="copy-btn" onclick="clearInput()">Clear</button>
      </div>
    </div>
    <div class="panel">
      <div class="output-text placeholder" id="outputText">Translation will appear here...</div>
      <div class="panel-footer">
        <span id="elapsed"></span>
        <button class="copy-btn" onclick="copyOutput()">Copy</button>
      </div>
    </div>
  </div>

  <button class="translate-btn" id="translateBtn" onclick="doTranslate()">Translate</button>
  <div class="status" id="status"></div>
</div>

<script>
const API = 'http://localhost:8000';
let controller = null;

function updateCount() {
  const len = document.getElementById('inputText').value.length;
  document.getElementById('charCount').textContent = `${len} chars`;
}

function clearInput() {
  document.getElementById('inputText').value = '';
  updateCount();
}

function swapLangs() {
  const s = document.getElementById('sourceLang');
  const t = document.getElementById('targetLang');
  const sv = s.value, tv = t.value;
  if (!sv) return;
  s.value = tv;
  t.value = sv;

  const output = document.getElementById('outputText');
  if (!output.classList.contains('placeholder')) {
    document.getElementById('inputText').value = output.textContent;
    updateCount();
  }
}

async function copyOutput() {
  const text = document.getElementById('outputText').textContent;
  await navigator.clipboard.writeText(text);
  document.querySelector('.panel:last-child .copy-btn').textContent = 'Copied!';
  setTimeout(() => {
    document.querySelector('.panel:last-child .copy-btn').textContent = 'Copy';
  }, 1500);
}

async function doTranslate() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) return;

  const target = document.getElementById('targetLang').value;
  const source = document.getElementById('sourceLang').value || undefined;
  const btn = document.getElementById('translateBtn');
  const output = document.getElementById('outputText');
  const status = document.getElementById('status');
  const elapsed = document.getElementById('elapsed');

  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span>Translating...';
  output.textContent = '';
  output.classList.remove('placeholder');
  status.textContent = '';
  elapsed.textContent = '';

  const start = performance.now();

  try {
    const resp = await fetch(`${API}/translate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, target, source, stream: true }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value);
      for (const line of chunk.split('\n')) {
        if (!line.startsWith('data: ') || line === 'data: [DONE]') continue;
        try {
          const data = JSON.parse(line.slice(6));
          output.textContent += data.token || '';
        } catch {}
      }
    }

    const ms = Math.round(performance.now() - start);
    elapsed.textContent = `${ms}ms`;
  } catch (e) {
    output.textContent = 'Error: Could not connect to translation API.\nMake sure the server is running: python translate_api.py';
    output.classList.add('placeholder');
    status.textContent = e.message;
  }

  btn.disabled = false;
  btn.textContent = 'Translate';
}

document.getElementById('inputText').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    doTranslate();
  }
});
</script>
</body>
</html>
