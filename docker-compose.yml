services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  setup:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    volumes:
      - ./Modelfile:/Modelfile
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Ollama..."
        until curl -sf http://ollama:11434/api/tags > /dev/null 2>&1; do sleep 1; done
        echo "Pulling gemma3:1b..."
        OLLAMA_HOST=http://ollama:11434 ollama pull gemma3:1b
        echo "Creating translator model..."
        OLLAMA_HOST=http://ollama:11434 ollama create translator -f /Modelfile
        echo "Setup complete!"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama

  web:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  ollama_data:
